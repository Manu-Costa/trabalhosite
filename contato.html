      <h1>Fale Conosco</h1>
      <p>Envie sua mensagem e responderemos em breve.</p>

      <form>

        <div class="input-box">
          <input type="text" required>

        </div>

          <input type="email" required>

        </div>

        <div class="input-box">
          <textarea required></textarea>
          <label>Mensagem</label>
        </div>

        <button type="submit">Enviar Mensagem</button>

      </form>
